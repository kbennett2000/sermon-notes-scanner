# Nur Pack-Tags matchen:
UpdateCheckMode: Tags ^lp-latin-best-v[0-9]+\.[0-9]+\.[0-9]+$
AutoUpdateMode: Version

Builds:
  - versionName: %v
    versionCode: 1
    commit: lp-latin-best-v%v
    subdir: langpack-latin-best
    gradle:
      - yes
    output: lang-latin-best/build/outputs/apk/release/lang-latin-best-release-unsigned.apk
    scanignore:
      - "**/*.traineddata"

