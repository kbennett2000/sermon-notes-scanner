name: ORT Compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compliance-ort:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install ORT
        run: |
          ORT_URL=$(curl -s https://api.github.com/repos/oss-review-toolkit/ort/releases/latest \
            | jq -r '.assets[] | select(.name | test("^ort-.*\\.tgz$")) | .browser_download_url')
          curl -L -o ort.tgz "$ORT_URL"
          tar -xzf ort.tgz
          sudo mv ort-*/ /opt/ort
          sudo ln -s /opt/ort/bin/ort /usr/local/bin/ort

      - name: Install ScanCode
        run: |
          pip install scancode-toolkit
          scancode --version

      - name: Remove .gitmodules for ORT
        run: |
          # ORT clones the repo again into /tmp and runs 'git submodule update --init --recursive'.
          # This would pull onnxruntime (~708MB+) and opencv (~211MB) submodules, causing timeouts.
          # By removing .gitmodules and amending the commit, ORT's fresh clone has no submodules.
          if [ -f .gitmodules ]; then
            git config user.email "ci@github.com"
            git config user.name "CI"
            git rm -f .gitmodules
            git commit --amend --no-edit
          fi

      - name: Run ORT
        run: |
          chmod +x scripts/run-ort.sh
          ./scripts/run-ort.sh

      - name: Upload ORT artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ort-reports
          path: ort-out/
